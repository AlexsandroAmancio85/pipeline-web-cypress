name: Regressivo QAzando - Agendado  # nome da pipeline
on: # momento de execução da pipeline
  schedule:
    - cron: '0 0 * * *'
jobs:
 cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar projeto
        uses: actions/checkout@v6

      - name: Cypress runs-on
        uses: cypress-io/github-action@v7
        with:
          record: true
        env:
          CYPRESS_RECORD_KEY: f78af0e8-53d4-4f71-a72e-89c7e5d02d0b